<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liminal System</title>

<style>
body {
margin: 0;
overflow: hidden;
background: black;
}

video {
position: fixed;
width: 100%;
height: 100%;
object-fit: cover;
filter: contrast(1.1) brightness(0.95) saturate(0.75);
}

/* VHS base */
#scanlines {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;

background: repeating-linear-gradient(
0deg,
rgba(0,0,0,0.12),
rgba(0,0,0,0.12) 1px,
transparent 2px,
transparent 4px
);

opacity: 0.35;
mix-blend-mode: overlay;
}

/* NOISE */
#noise {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;
background: url("https://upload.wikimedia.org/wikipedia/commons/5/5c/Image_gaussian_noise_example.png");
background-size: cover;
opacity: 0.05;
mix-blend-mode: overlay;
}

/* VIGNETTE */
#vignette {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;

background: radial-gradient(
circle,
rgba(0,0,0,0) 45%,
rgba(0,0,0,0.85)
);
}

/* START */
#start {
position: fixed;
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
background: black;
z-index: 10;
}

button {
padding: 20px;
font-size: 18px;
}
</style>
</head>

<body>

<div id="start">
<button id="btn">ENTRA</button>
</div>

<video id="video" playsinline autoplay muted></video>

<div id="scanlines"></div>
<div id="noise"></div>
<div id="vignette"></div>

<audio id="audio" loop>
<source src="assets/audio/liminal1.mp3" type="audio/mpeg">
</audio>

<script>

const video = document.getElementById("video");
const audio = document.getElementById("audio");
const btn = document.getElementById("btn");
const start = document.getElementById("start");

/* stato instabilità */
let instability = 0;

btn.onclick = async () => {

start.style.display = "none";

/* CAMERA */
const stream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: "environment" }
});

video.srcObject = stream;
await video.play();

/* AUDIO */
audio.load();
audio.play();

/* =========================
   SISTEMA PERCETTIVO
   ========================= */

setInterval(() => {

// instabilità cresce nel tempo
instability += 0.002;

// movimento impercettibile ma cumulativo
const dx = (Math.random() - 0.5) * instability * 5;
const dy = (Math.random() - 0.5) * instability * 5;

video.style.transform =
`translate(${dx}px, ${dy}px) scale(1.02)`;

// il mondo “perde fedeltà”
video.style.filter =
`contrast(${1.1 + instability})
 brightness(${0.95 - instability * 0.2})
 saturate(${0.75 - instability * 0.3})`;

}, 120);

/* =========================
   EVENTI RARI (CHIAVE PSICOLOGICA)
   ========================= */

setInterval(() => {

if (Math.random() > 0.92) {

// glitch breve “impossibile”
video.style.filter = "invert(1) contrast(1.5)";

setTimeout(() => {
video.style.filter = "";
}, 120);

}

}, 1800);

/* =========================
   AUDIO CHE “CAMBIA STANZA”
   ========================= */

setInterval(() => {

audio.volume = 0.15 + Math.random() * 0.25;
audio.playbackRate = 0.85 + Math.random() * 0.25;

}, 3000);

};

</script>

</body>
</html>
