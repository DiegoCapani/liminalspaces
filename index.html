<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liminal Perception</title>

<style>
body {
margin: 0;
background: black;
overflow: hidden;
}

video {
position: fixed;
width: 100%;
height: 100%;
object-fit: cover;
transform: scale(1.02);
}

/* PERIFERIA INSTABILE */
#vignette {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;

background: radial-gradient(
circle,
rgba(0,0,0,0) 45%,
rgba(0,0,0,0.75) 100%
);

animation: breathe 6s infinite ease-in-out;
}

@keyframes breathe {
0%   { transform: scale(1); opacity: 0.7; }
50%  { transform: scale(1.03); opacity: 0.85; }
100% { transform: scale(1); opacity: 0.7; }
}

/* NEBBIA PSICOLOGICA */
#fog {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;
background: rgba(255,255,240,0.03);
mix-blend-mode: overlay;
}

/* START */
#start {
position: fixed;
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
background: black;
z-index: 10;
}

button {
padding: 20px;
font-size: 18px;
}
</style>
</head>

<body>

<div id="start">
<button id="btn">ENTRA</button>
</div>

<video id="video" playsinline autoplay muted></video>

<div id="fog"></div>
<div id="vignette"></div>

<audio id="audio" loop>
<source src="assets/audio/liminal1.mp3" type="audio/mpeg">
</audio>

<script>

const video = document.getElementById("video");
const audio = document.getElementById("audio");
const btn = document.getElementById("btn");
const start = document.getElementById("start");

btn.onclick = async () => {

start.style.display = "none";

/* CAMERA */
const stream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: "environment" }
});

video.srcObject = stream;
await video.play();

/* AUDIO */
audio.load();
audio.currentTime = 0;
audio.play();

/* =========================
   DRIFT PERCETTIVO
   ========================= */

let driftX = 0;
let driftY = 0;

setInterval(() => {

// micro movimento impercettibile
driftX += (Math.random() - 0.5) * 0.002;
driftY += (Math.random() - 0.5) * 0.002;

video.style.transform =
`translate(${driftX}px, ${driftY}px) scale(1.02)`;

}, 50);

/* =========================
   AUDIO PERCETTIVO
   ========================= */

setInterval(() => {

audio.volume = 0.25 + Math.random() * 0.15;
audio.playbackRate = 0.95 + Math.random() * 0.1;

}, 4000);

/* =========================
   EVENTI RARI (DISAGIO)
   ========================= */

setInterval(() => {

if (Math.random() > 0.88) {

// glitch percettivo breve
video.style.filter = "contrast(1.3) brightness(1.2)";

setTimeout(() => {
video.style.filter = "none";
}, 180);

}

}, 2500);

/* NEBBIA DINAMICA */
setInterval(() => {

document.getElementById("fog").style.opacity =
0.05 + Math.random() * 0.08;

}, 2000);

};

</script>

</body>
</html>
