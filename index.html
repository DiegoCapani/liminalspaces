<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Backrooms Perception</title>

<style>
html, body {
margin: 0;
padding: 0;
width: 100%;
height: 100%;
overflow: hidden;
background: black;
}

/* CAMERA */
video {
position: fixed;
width: 100%;
height: 100%;
object-fit: cover;

/* 🎨 TINTA BACKROOMS */
filter: 
sepia(0.35)
saturate(1.6)
contrast(1.15)
brightness(0.95)
hue-rotate(25deg);
}

/* VHS SCANLINES */
.scanlines {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;

background: repeating-linear-gradient(
0deg,
rgba(0,0,0,0.12),
rgba(0,0,0,0.12) 1px,
transparent 2px,
transparent 4px
);

mix-blend-mode: overlay;
opacity: 0.35;
}

/* NOISE */
.noise {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;

background: url("https://upload.wikimedia.org/wikipedia/commons/5/5c/Image_gaussian_noise_example.png");
background-size: cover;
mix-blend-mode: overlay;
opacity: 0.06;
}

/* VIGNETTE */
.vignette {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;

background: radial-gradient(
circle,
rgba(0,0,0,0) 40%,
rgba(0,0,0,0.85)
);
}

/* LIGHT FLICKER SIMULATO */
.flicker {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;
background: rgba(255, 244, 180, 0.04);
mix-blend-mode: screen;
animation: flickerAnim 3s infinite;
}

@keyframes flickerAnim {
0% { opacity: 0.2; }
5% { opacity: 0.05; }
10% { opacity: 0.25; }
50% { opacity: 0.15; }
100% { opacity: 0.2; }
}

/* 📼 VHS TRACKING INTERFERENCE */
.vhs-line {
position: fixed;
left: 0;
width: 100%;
height: 2px;
background: rgba(255,255,255,0.08);
mix-blend-mode: overlay;
opacity: 0;
pointer-events: none;
}

/* START */
#start {
position: fixed;
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
background: black;
z-index: 10;
}

button {
padding: 20px 30px;
font-size: 18px;
border: none;
background: white;
cursor: pointer;
}
</style>
</head>

<body>

<div id="start">
<button id="btn">ENTRA</button>
</div>

<video id="video" playsinline autoplay muted></video>

<div class="scanlines"></div>
<div class="noise"></div>
<div class="vignette"></div>
<div class="flicker"></div>

<!-- VHS LINE -->
<div class="vhs-line" id="vhsLine"></div>

<audio id="audio" loop>
<source src="assets/audio/liminal1.mp3" type="audio/mpeg">
</audio>

<script>

const video = document.getElementById("video");
const btn = document.getElementById("btn");
const start = document.getElementById("start");
const audio = document.getElementById("audio");

const vhsLine = document.getElementById("vhsLine");

/* FULLSCREEN */
async function goFullscreen() {
const el = document.documentElement;

if (el.requestFullscreen) await el.requestFullscreen();
else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
else if (el.msRequestFullscreen) await el.msRequestFullscreen();
}

btn.onclick = async () => {

await goFullscreen();

start.style.display = "none";

/* CAMERA */
const stream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: { ideal: "environment" } }
});

video.srcObject = stream;
await video.play();

/* AUDIO */
audio.load();
audio.play().catch(e => console.log("audio bloccato", e));

/* =========================
   BACKROOMS COLOR SYSTEM
   ========================= */

setInterval(() => {

const hue = 25 + Math.sin(Date.now() * 0.0003) * 3;

video.style.filter = `
sepia(0.35)
saturate(1.6)
contrast(${1.1 + Math.random() * 0.05})
brightness(${0.92 + Math.random() * 0.05})
hue-rotate(${hue}deg)
`;

}, 120);

/* EVENTI RARI */
setInterval(() => {

if (Math.random() > 0.9) {

video.style.filter = "brightness(1.4) contrast(0.8) sepia(0.5)";

setTimeout(() => {
video.style.filter = "";
}, 150);

}

}, 2500);

/* AUDIO INSTABILE */
setInterval(() => {

audio.volume = 0.15 + Math.random() * 0.2;
audio.playbackRate = 0.9 + Math.random() * 0.15;

}, 4000);

/* =========================
   📼 VHS DISTORTION SYSTEM (B)
   ========================= */

let t = 0;

setInterval(() => {

t += 0.02;

/* DISTORSIONE VIDEO (warp leggero) */
const warpX = Math.sin(t) * 2;
const warpY = Math.cos(t * 0.8) * 1.5;

video.style.transform = `translate(${warpX}px, ${warpY}px) scale(1.01)`;

}, 50);

/* =========================
   📼 VHS TRACKING LINE
   ========================= */

function vhsScanline() {

const delay = 2000 + Math.random() * 5000;

setTimeout(() => {

const startY = Math.random() * window.innerHeight;

vhsLine.style.top = startY + "px";
vhsLine.style.opacity = 0.5;

let drift = 0;

const move = setInterval(() => {
drift += 8;
vhsLine.style.top = startY + drift + "px";
}, 16);

setTimeout(() => {
clearInterval(move);
vhsLine.style.opacity = 0;
}, 700);

vhsScanline();

}, delay);

}

vhsScanline();

};

</script>

</body>
</html>
