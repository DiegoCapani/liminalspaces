<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liminal VHS Perception</title>

<style>
body {
margin: 0;
overflow: hidden;
background: black;
}

/* CAMERA */
video {
position: fixed;
width: 100%;
height: 100%;
object-fit: cover;

/* base instabile */
filter: contrast(1.1) brightness(0.95) saturate(0.7);
}

/* VHS SCANLINES */
#scanlines {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;

background: repeating-linear-gradient(
0deg,
rgba(0,0,0,0.15),
rgba(0,0,0,0.15) 1px,
transparent 2px,
transparent 4px
);

mix-blend-mode: overlay;
opacity: 0.4;
animation: flicker 0.12s infinite;
}

/* NOISE */
#noise {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;

background-image: url("https://upload.wikimedia.org/wikipedia/commons/5/5c/Image_gaussian_noise_example.png");
background-size: cover;

mix-blend-mode: overlay;
opacity: 0.06;
animation: noiseMove 0.3s infinite;
}

/* GLOW DISTURBATO */
#glow {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;

background: radial-gradient(
circle,
rgba(255,255,220,0.05),
rgba(0,0,0,0.8)
);

mix-blend-mode: screen;
animation: breathe 5s infinite ease-in-out;
}

/* VIGNETTA */
#vignette {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;

background: radial-gradient(
circle,
rgba(0,0,0,0) 40%,
rgba(0,0,0,0.8)
);
}

/* ANIMAZIONI */
@keyframes flicker {
0% { opacity: 0.35; }
50% { opacity: 0.45; }
100% { opacity: 0.3; }
}

@keyframes noiseMove {
0% { transform: translate(0,0); }
25% { transform: translate(-2px,1px); }
50% { transform: translate(2px,-1px); }
75% { transform: translate(-1px,-2px); }
100% { transform: translate(0,0); }
}

@keyframes breathe {
0% { opacity: 0.2; transform: scale(1); }
50% { opacity: 0.35; transform: scale(1.03); }
100% { opacity: 0.2; transform: scale(1); }
}

/* START */
#start {
position: fixed;
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
background: black;
z-index: 10;
}

button {
padding: 20px;
font-size: 18px;
}
</style>
</head>

<body>

<div id="start">
<button id="btn">ENTRA</button>
</div>

<video id="video" playsinline autoplay muted></video>

<div id="scanlines"></div>
<div id="noise"></div>
<div id="glow"></div>
<div id="vignette"></div>

<audio id="audio" loop>
<source src="assets/audio/liminal1.mp3" type="audio/mpeg">
</audio>

<script>

const video = document.getElementById("video");
const audio = document.getElementById("audio");
const btn = document.getElementById("btn");
const start = document.getElementById("start");

btn.onclick = async () => {

start.style.display = "none";

/* CAMERA */
const stream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: "environment" }
});

video.srcObject = stream;
await video.play();

/* AUDIO */
audio.load();
audio.currentTime = 0;
audio.play();

/* =========================
   GLITCH RANDOM FRAME
   ========================= */

setInterval(() => {

// micro glitch frame shift
const dx = (Math.random() - 0.5) * 6;
const dy = (Math.random() - 0.5) * 6;

video.style.transform = `translate(${dx}px, ${dy}px) scale(1.02)`;

// flicker exposure
video.style.filter =
`contrast(${1 + Math.random()*0.2})
 brightness(${0.9 + Math.random()*0.2})
 saturate(${0.6 + Math.random()*0.3})`;

}, 120);

/* =========================
   AUDIO INSTABILITY
   ========================= */

setInterval(() => {

audio.volume = 0.2 + Math.random() * 0.2;
audio.playbackRate = 0.9 + Math.random() * 0.2;

}, 3500);

/* =========================
   RANDOM FLASH GLITCH
   ========================= */

setInterval(() => {

if (Math.random() > 0.9) {

document.body.style.filter = "invert(1) contrast(1.2)";

setTimeout(() => {
document.body.style.filter = "none";
}, 80);

}

}, 2000);

};

</script>

</body>
</html>
