<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Backrooms Liminal System</title>

<style>
html, body {
margin: 0;
padding: 0;
width: 100%;
height: 100%;
overflow: hidden;
background: black;
}

/* CAMERA */
video {
position: fixed;
width: 100%;
height: 100%;
object-fit: cover;

/* tinta backrooms */
filter:
sepia(0.35)
saturate(1.5)
contrast(1.1)
brightness(0.95)
hue-rotate(25deg);
}

/* VHS SCANLINES */
.scanlines {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;

background: repeating-linear-gradient(
0deg,
rgba(0,0,0,0.12),
rgba(0,0,0,0.12) 1px,
transparent 2px,
transparent 4px
);

mix-blend-mode: overlay;
opacity: 0.35;
}

/* NOISE */
.noise {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;

background: url("https://upload.wikimedia.org/wikipedia/commons/5/5c/Image_gaussian_noise_example.png");
background-size: cover;
mix-blend-mode: overlay;
opacity: 0.06;
}

/* VIGNETTE */
.vignette {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;

background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.85));
}

/* START */
#start {
position: fixed;
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
background: black;
z-index: 10;
}

button {
padding: 20px 30px;
font-size: 18px;
border: none;
background: white;
cursor: pointer;
}

/* 👻 GHOST */
#ghost {
position: fixed;
top: 50%;
left: 70%;
width: 180px;
height: 320px;

transform: translate(-50%, -50%);

background: radial-gradient(
ellipse at center,
rgba(0,0,0,0.45),
rgba(0,0,0,0)
);

filter: blur(14px);
opacity: 0;

mix-blend-mode: multiply;
pointer-events: none;

transition: opacity 0.2s ease;
}
</style>
</head>

<body>

<div id="start">
<button id="btn">ENTRA</button>
</div>

<video id="video" playsinline autoplay muted></video>

<div class="scanlines"></div>
<div class="noise"></div>
<div class="vignette"></div>

<div id="ghost"></div>

<audio id="audio" loop>
<source src="assets/audio/liminal1.mp3" type="audio/mpeg">
</audio>

<script>

const btn = document.getElementById("btn");
const start = document.getElementById("start");
const video = document.getElementById("video");
const audio = document.getElementById("audio");
const ghost = document.getElementById("ghost");

/* FULLSCREEN */
async function goFullscreen() {
const el = document.documentElement;

if (el.requestFullscreen) await el.requestFullscreen();
else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
else if (el.msRequestFullscreen) await el.msRequestFullscreen();
}

btn.onclick = async () => {

await goFullscreen();

start.style.display = "none";

/* CAMERA */
const stream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: { ideal: "environment" } }
});

video.srcObject = stream;
await video.play();

/* AUDIO */
audio.load();
audio.currentTime = 0;
audio.play().catch(e => console.log("audio bloccato", e));

/* =========================
   BACKROOMS DRIFT SYSTEM
   ========================= */

let t = 0;

setInterval(() => {

t += 0.01;

const drift = Math.sin(t) * 1.5;

video.style.transform = `translate(${drift}px, 0px)`;

video.style.filter =
`
sepia(0.35)
saturate(1.5)
contrast(${1.05 + Math.random() * 0.08})
brightness(${0.92 + Math.random() * 0.06})
hue-rotate(${25 + Math.sin(Date.now() * 0.0003) * 3}deg)
`;

}, 100);

/* =========================
   AUDIO INSTABILITY
   ========================= */

setInterval(() => {

audio.volume = 0.15 + Math.random() * 0.25;
audio.playbackRate = 0.9 + Math.random() * 0.2;

}, 3500);

/* =========================
   👻 GHOST RANDOM SYSTEM
   ========================= */

function showGhost() {

const x = 50 + (Math.random() * 40 - 20);
const y = 50 + (Math.random() * 30 - 15);

ghost.style.left = x + "%";
ghost.style.top = y + "%";

const intensity = 0.15 + Math.random() * 0.35;

ghost.style.opacity = intensity;
ghost.style.filter = `blur(${10 + Math.random() * 10}px)`;

let t = 0;

const pulse = setInterval(() => {

t += 0.1;

ghost.style.opacity =
intensity * (0.6 + Math.sin(t) * 0.4);

ghost.style.transform =
`translate(-50%, -50%) scale(${1 + Math.sin(t) * 0.04})`;

}, 60);

setTimeout(() => {
clearInterval(pulse);
ghost.style.opacity = 0;
}, 400 + Math.random() * 1200);

}

/* RANDOM LOOP NON PREVEDIBILE */
function ghostLoop() {

const next = 2000 + Math.random() * 6000;

setTimeout(() => {

if (Math.random() > 0.6) {
showGhost();
}

ghostLoop();

}, next);
}

ghostLoop();

};

</script>

</body>
</html>
