<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liminal AR Filter</title>

<style>
body {
margin: 0;
overflow: hidden;
background: black;
font-family: Arial;
}

/* VIDEO CAMERA */
video {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
object-fit: cover;
transform: scale(1.05);
filter: contrast(1.2) brightness(0.9) saturate(0.6) hue-rotate(10deg);
}

/* OVERLAY LIMINALE */
#overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;

/* effetto inquietante */
background: radial-gradient(
circle at center,
rgba(255,255,240,0.05),
rgba(0,0,0,0.6)
);

mix-blend-mode: overlay;
animation: flicker 6s infinite;
}

/* VIGNETTA */
#vignette {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
background: radial-gradient(
circle,
transparent 40%,
rgba(0,0,0,0.7)
);
}

/* DISTORSIONE LENTA */
@keyframes flicker {
0% { opacity: 0.7; }
5% { opacity: 0.4; }
10% { opacity: 0.8; }
15% { opacity: 0.6; }
50% { opacity: 0.75; }
100% { opacity: 0.6; }
}

/* START SCREEN */
#startScreen {
position: fixed;
width: 100%;
height: 100%;
background: black;
display: flex;
align-items: center;
justify-content: center;
z-index: 10;
}

button {
padding: 20px 30px;
font-size: 18px;
border: none;
cursor: pointer;
background: white;
}
</style>
</head>

<body>

<div id="startScreen">
<button onclick="start()">ENTRA</button>
</div>

<video id="video" autoplay playsinline></video>

<div id="overlay"></div>
<div id="vignette"></div>

<audio id="audio" loop>
<source src="assets/audio/liminal1.mp3" type="audio/mpeg">
</audio>

<script>

const video = document.getElementById("video");
const audio = document.getElementById("audio");
const startScreen = document.getElementById("startScreen");

function start() {

startScreen.style.display = "none";

// CAMERA
navigator.mediaDevices.getUserMedia({
video: { facingMode: "environment" }
}).then(stream => {
video.srcObject = stream;
});

// AUDIO
audio.volume = 0.3;
audio.play();

// micro glitch audio random (disagio)
setInterval(() => {
if (Math.random() > 0.7) {
audio.playbackRate = 0.85 + Math.random() * 0.3;
audio.volume = 0.2 + Math.random() * 0.2;
}
}, 4000);

// flicker globale più forte nel tempo
let intensity = 1;

setInterval(() => {
intensity += 0.01;

document.body.style.filter =
`contrast(${1.2 + Math.random() * 0.2})
brightness(${0.9 - Math.random() * 0.1})
saturate(${0.6 - Math.random() * 0.2})
hue-rotate(${10 + Math.random() * 5}deg)`;

}, 200);

}

</script>

</body>
</html>
