<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liminal AR Filter</title>

<style>
body {
margin: 0;
overflow: hidden;
background: black;
}

/* CAMERA */
video {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
object-fit: cover;
transform: scale(1.05);
filter: contrast(1.2) brightness(0.9) saturate(0.7);
}

/* OVERLAY */
#overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
background: radial-gradient(circle, rgba(255,255,240,0.05), rgba(0,0,0,0.7));
}

/* VIGNETTE */
#vignette {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8));
}

/* START */
#startScreen {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
background: black;
z-index: 10;
}

button {
padding: 20px 30px;
font-size: 18px;
border: none;
background: white;
cursor: pointer;
}
</style>
</head>

<body>

<div id="startScreen">
<button id="startBtn">ENTRA</button>
</div>

<video id="video" playsinline autoplay muted></video>

<div id="overlay"></div>
<div id="vignette"></div>

<audio id="audio" loop>
<source src="assets/audio/liminal1.mp3" type="audio/mpeg">
</audio>

<script>

const video = document.getElementById("video");
const startBtn = document.getElementById("startBtn");
const startScreen = document.getElementById("startScreen");
const audio = document.getElementById("audio");

startBtn.addEventListener("click", async () => {

try {

startScreen.style.display = "none";

// CAMERA (FIX IMPORTANTE)
const stream = await navigator.mediaDevices.getUserMedia({
video: {
facingMode: { ideal: "environment" }
},
audio: false
});

video.srcObject = stream;

// IMPORTANTISSIMO per iOS
await video.play();

// AUDIO (serve gesto utente)
audio.volume = 0.3;
audio.play();

startLiminalEffects();

} catch (err) {
alert("Camera non disponibile: " + err.message);
console.log(err);
}

});

function startLiminalEffects() {

// variazione visiva continua
setInterval(() => {

document.body.style.filter =
`contrast(${1.2 + Math.random() * 0.2})
brightness(${0.85 + Math.random() * 0.1})
saturate(${0.6 + Math.random() * 0.2})`;

}, 3000);

// micro flicker overlay
setInterval(() => {

document.getElementById("overlay").style.opacity =
0.4 + Math.random() * 0.4;

}, 2000);

}

</script>

</body>
</html>
