<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liminal Stable</title>

<style>
body {
margin: 0;
background: black;
overflow: hidden;
}

video {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
object-fit: cover;
background: black;
}

#overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.6));
}

#start {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
background: black;
z-index: 10;
}

button {
padding: 20px;
font-size: 18px;
}
</style>
</head>

<body>

<div id="start">
<button id="btn">AVVIA CAMERA</button>
</div>

<video id="video" playsinline autoplay muted></video>

<div id="overlay"></div>

<audio id="audio" loop>
<source src="assets/audio/liminal1.mp3" type="audio/mpeg">
</audio>

<script>

const video = document.getElementById("video");
const btn = document.getElementById("btn");
const start = document.getElementById("start");
const audio = document.getElementById("audio");

btn.addEventListener("click", async () => {

try {

start.style.display = "none";

/* CAMERA */
const stream = await navigator.mediaDevices.getUserMedia({
video: {
facingMode: { ideal: "environment" }
},
audio: false
});

video.srcObject = stream;

await video.play();

/* AUDIO (FIX ASSOLUTO) */
audio.load();
audio.currentTime = 0;

const playPromise = audio.play();

if (playPromise !== undefined) {
playPromise.catch(err => {
console.log("Audio bloccato:", err);
alert("Audio bloccato dal browser");
});
}

/* DEBUG VISIVO (per capire se funziona) */
setInterval(() => {
document.getElementById("overlay").style.opacity =
0.2 + Math.random() * 0.2;
}, 2000);

} catch (err) {
alert("Errore camera: " + err.message);
console.log(err);
}

});

</script>

</body>
</html>
