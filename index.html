<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Liminal VR Cardboard</title>

<style>
html, body {
margin: 0;
padding: 0;
width: 100%;
height: 100%;
overflow: hidden;
background: black;
}

/* VR LAYOUT */
#vr {
position: fixed;
width: 100%;
height: 100%;
display: flex;
flex-direction: row;
}

.eye {
width: 50%;
height: 100%;
overflow: hidden;
position: relative;
}

/* CAMERA */
video {
position: absolute;
top: 0;
left: 0;
width: 200%;
height: 100%;
object-fit: cover;
}

/* VHS SCANLINES */
.scanlines {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;
background: repeating-linear-gradient(
0deg,
rgba(0,0,0,0.12),
rgba(0,0,0,0.12) 1px,
transparent 2px,
transparent 4px
);
mix-blend-mode: overlay;
opacity: 0.35;
}

/* NOISE */
.noise {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;
background: url("https://upload.wikimedia.org/wikipedia/commons/5/5c/Image_gaussian_noise_example.png");
background-size: cover;
mix-blend-mode: overlay;
opacity: 0.05;
}

/* VIGNETTE */
.vignette {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;
background: radial-gradient(circle, rgba(0,0,0,0) 45%, rgba(0,0,0,0.85));
}

/* START */
#start {
position: fixed;
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
background: black;
z-index: 10;
}

button {
padding: 20px 30px;
font-size: 18px;
border: none;
background: white;
cursor: pointer;
}
</style>
</head>

<body>

<div id="start">
<button id="btn">ENTRA IN VR</button>
</div>

<div id="vr">

<div class="eye">
<video id="videoL" playsinline autoplay muted></video>
</div>

<div class="eye">
<video id="videoR" playsinline autoplay muted></video>
</div>

</div>

<div class="scanlines"></div>
<div class="noise"></div>
<div class="vignette"></div>

<audio id="audio" loop>
<source src="assets/audio/liminal1.mp3" type="audio/mpeg">
</audio>

<script>

const btn = document.getElementById("btn");
const start = document.getElementById("start");

const vL = document.getElementById("videoL");
const vR = document.getElementById("videoR");

const audio = document.getElementById("audio");

/* FULLSCREEN */
async function goFullscreen() {
const el = document.documentElement;

if (el.requestFullscreen) await el.requestFullscreen();
else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
else if (el.msRequestFullscreen) await el.msRequestFullscreen();
}

btn.onclick = async () => {

await goFullscreen();

start.style.display = "none";

/* CAMERA */
const stream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: { ideal: "environment" } }
});

vL.srcObject = stream;
vR.srcObject = stream;

await vL.play();
await vR.play();

/* AUDIO */
audio.load();
audio.currentTime = 0;
audio.play().catch(e => console.log("audio bloccato", e));

/* =========================
   LIMINAL PERCEPTION ENGINE
   ========================= */

let t = 0;

setInterval(() => {

t += 0.01;

/* micro drift stereoscopico */
const drift = Math.sin(t) * 2;

vL.style.transform = `translateX(${drift}px)`;
vR.style.transform = `translateX(${-drift}px)`;

/* instabilità visiva lenta */
const c = 1 + Math.random() * 0.15;

vL.style.filter = `contrast(${c}) brightness(0.95) saturate(0.8)`;
vR.style.filter = `contrast(${c}) brightness(0.95) saturate(0.8)`;

}, 80);

/* EVENTI RARI (DISAGIO PERCETTIVO) */
setInterval(() => {

if (Math.random() > 0.92) {

document.body.style.filter = "invert(1) contrast(1.2)";

setTimeout(() => {
document.body.style.filter = "none";
}, 120);

}

}, 2000);

/* AUDIO INSTABILE */
setInterval(() => {

audio.volume = 0.15 + Math.random() * 0.25;
audio.playbackRate = 0.9 + Math.random() * 0.2;

}, 3500);

};

</script>

</body>
</html>
