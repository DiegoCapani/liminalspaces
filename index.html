<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liminal Perception</title>

<style>
body {
margin: 0;
background: black;
overflow: hidden;
}

/* CAMERA STABILE */
video {
position: fixed;
width: 100%;
height: 100%;
object-fit: cover;
}

/* DISTORSIONE SOLO AI BORDI */
#vignette {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;

background: radial-gradient(
circle,
rgba(0,0,0,0) 45%,
rgba(0,0,0,0.75) 100%
);
}

/* NEBBIA PSICOLOGICA */
#fog {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;
background: rgba(255,255,240,0.03);
mix-blend-mode: overlay;
}

/* START */
#start {
position: fixed;
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
background: black;
z-index: 10;
}

button {
padding: 20px;
font-size: 18px;
}
</style>
</head>

<body>

<div id="start">
<button id="btn">ENTRA</button>
</div>

<video id="video" playsinline autoplay muted></video>

<div id="fog"></div>
<div id="vignette"></div>

<audio id="audio" loop>
<source src="assets/audio/liminal.mp3" type="audio/mpeg">
</audio>

<script>

const video = document.getElementById("video");
const audio = document.getElementById("audio");
const btn = document.getElementById("btn");
const start = document.getElementById("start");

/* CAMERA */
btn.onclick = async () => {

start.style.display = "none";

const stream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: "environment" }
});

video.srcObject = stream;
await video.play();

/* AUDIO FIX */
audio.load();
audio.currentTime = 0;

audio.play().catch(e => {
console.log("audio bloccato", e);
});

/* =========================
   PERCEZIONE INSTABILE
   ========================= */

let intensity = 1;

setInterval(() => {

intensity += 0.003;

// variazione lenta (quasi impercettibile)
document.getElementById("fog").style.opacity =
0.1 + Math.random() * 0.1;

// micro shift visivo globale
document.body.style.filter =
`contrast(${1 + Math.sin(Date.now()*0.0002)*0.05})
brightness(${0.95 + Math.sin(Date.now()*0.0003)*0.03})
saturate(${0.9 + Math.sin(Date.now()*0.00025)*0.05})`;

}, 200);

/* EVENTI RARI (DISAGIO VERO) */
setInterval(() => {

if (Math.random() > 0.85) {

// glitch breve percepito
document.body.style.filter = "brightness(1.3) contrast(0.8)";

setTimeout(() => {
document.body.style.filter = "";
}, 200);

}

}, 3000);

};

</script>

</body>
</html>
