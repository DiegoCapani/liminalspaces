<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liminal Stable Camera</title>

<style>
body {
margin: 0;
background: black;
overflow: hidden;
}

/* CAMERA STABILE */
video {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
object-fit: cover;

/* IMPORTANTE: evita glitch GPU */
transform: none;
filter: none;

background: black;
}

/* leggero filtro separato (NON sul video) */
#fx {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;

background: rgba(255,255,240,0.04);
mix-blend-mode: overlay;
}

/* vignetta */
#vignette {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;

background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.75));
}

#start {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
background: black;
z-index: 10;
}

button {
padding: 20px 30px;
font-size: 18px;
border: none;
background: white;
}
</style>
</head>

<body>

<div id="start">
<button id="btn">ENTRA</button>
</div>

<video id="video" playsinline autoplay muted></video>

<div id="fx"></div>
<div id="vignette"></div>

<audio id="audio" loop>
<source src="assets/audio/liminal.mp3" type="audio/mpeg">
</audio>

<script>

const video = document.getElementById("video");
const btn = document.getElementById("btn");
const start = document.getElementById("start");
const audio = document.getElementById("audio");

let streamRef = null;

btn.onclick = async () => {

try {

start.style.display = "none";

// CAMERA
streamRef = await navigator.mediaDevices.getUserMedia({
video: {
facingMode: { ideal: "environment" }
},
audio: false
});

// IMPORTANTISSIMO: attach stream PRIMA
video.srcObject = streamRef;

// forza stabilità playback
await video.play();

// lock stream (trucco anti-black screen)
setInterval(() => {
if (video.paused) {
video.play();
}
}, 1000);

// AUDIO
audio.volume = 0.3;
audio.play();

// leggero flicker sicuro (NO filter su video)
setInterval(() => {
document.getElementById("fx").style.opacity =
0.2 + Math.random() * 0.2;
}, 1500);

} catch (e) {
alert("Camera error: " + e.message);
console.log(e);
}

};

</script>

</body>
</html>
